name: Bug report
description: Report a problem with POI-UI
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: POI-UI version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      description: Which theme(s) does this affect?
      options:
        - Both
        - Machine (dark)
        - Samaritan (light)
        - Not theme-specific
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal reproduction (code snippet, REPL, or repo link) is hugely helpful.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: Svelte version, browser, OS
    validations:
      required: false
