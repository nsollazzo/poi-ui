name: OSV-Scanner (PR)

# Diff-based supply-chain gate: fails only on vulnerabilities a PR *introduces*
# (so the existing baseline never blocks a feature PR). The full scheduled scan
# lives in osv-scanner.yml.
on:
  pull_request:
    branches: [main]
  merge_group:

permissions: read-all

jobs:
  scan-pr:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
