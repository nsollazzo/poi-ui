name: Release

on:
  push:
    branches: [main]

# Changesets opens/updates a "Version Packages" PR; merging it publishes to npm.
permissions:
  contents: write
  pull-requests: write
  id-token: write # npm trusted publishing (OIDC) + provenance

concurrency:
  group: release-${{ github.ref }}

# Don't run git hooks (commitlint would reject the bot's "Version Packages" commit).
env:
  HUSKY: '0'

jobs:
  release:
    runs-on: ubuntu-latest
    # Surface the App id as an env var so the step below can test whether the
    # GitHub App credentials are configured: the `secrets` context is not allowed
    # in a step-level `if`, but `env` is.
    env:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # Mint a short-lived, repo-scoped GitHub App token so the "Version Packages"
      # PR is authored by the app rather than GITHUB_TOKEN. GitHub suppresses
      # workflow runs on GITHUB_TOKEN-authored pushes (anti-recursion), which left
      # that PR unable to satisfy the required CI checks; an app token triggers them.
      #
      # Optional by design: when RELEASE_APP_ID / RELEASE_APP_PRIVATE_KEY are not
      # configured, this step is skipped and the steps below fall back to
      # GITHUB_TOKEN. Publishing (OIDC) still works; only the Version PR's
      # auto-CI-trigger is lost until the App secrets are added — at which point
      # this self-upgrades with no further change. Without this guard the whole
      # release job hard-fails at token minting and never reaches publish.
      - if: ${{ env.RELEASE_APP_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          # Scope the token to exactly what changesets needs (push the Version
          # branch + open/update its PR); don't inherit blanket install perms.
          permission-contents: write
          permission-pull-requests: write
      # changesets/action pushes the Version Packages branch with this persisted
      # token; this job uploads no artifacts, so artipacked does not apply.
      # Fall back to GITHUB_TOKEN when the App token wasn't minted.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 # zizmor: ignore[artipacked]
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # npm trusted publishing (OIDC) needs npm >= 11.5.1; provenance is automatic.
      # Pinned (not @latest): this job holds id-token + write tokens, so a
      # compromised npm release must not be able to walk straight into it.
      - run: npm install -g npm@11.16.0
      - name: Create Release PR or publish to npm
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm release
        env:
          # No NPM_TOKEN: publishing authenticates via OIDC trusted publishing.
          # Configure the trusted publisher on npmjs.com (org positronick, repo
          # ui, workflow release.yml) before the first OIDC publish.
          # Prefer the App token (so an opened Version PR's commits trigger the
          # required CI checks); fall back to GITHUB_TOKEN when the App isn't set up.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
