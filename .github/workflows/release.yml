name: Release

on:
  push:
    branches: [main]

# Changesets opens/updates a "Version Packages" PR; merging it publishes to npm.
permissions:
  contents: write
  pull-requests: write
  id-token: write # npm trusted publishing (OIDC) + provenance

concurrency:
  group: release-${{ github.ref }}

# Don't run git hooks (commitlint would reject the bot's "Version Packages" commit).
env:
  HUSKY: '0'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # changesets/action pushes the Version Packages branch with the persisted
      # token; this job uploads no artifacts, so artipacked does not apply.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 # zizmor: ignore[artipacked]
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # npm trusted publishing (OIDC) needs npm >= 11.5.1; provenance is automatic.
      # Pinned (not @latest): this job holds id-token + write tokens, so a
      # compromised npm release must not be able to walk straight into it.
      - run: npm install -g npm@11.16.0
      - name: Create Release PR or publish to npm
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm release
        env:
          # No NPM_TOKEN: publishing authenticates via OIDC trusted publishing.
          # Configure the trusted publisher on npmjs.com (org nsollazzo, repo
          # poi-ui, workflow release.yml) before the first OIDC publish.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
