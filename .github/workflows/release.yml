name: Release

# Tag-driven publishing. A maintainer runs the release ritual locally:
#   1. pnpm changeset version   # consume .changeset/*.md → bump package.json + CHANGELOG.md
#   2. git commit -am "chore: release vX.Y.Z"
#   3. git tag vX.Y.Z && git push --follow-tags
# Pushing the tag fires this workflow, which publishes to npm and cuts a GitHub
# Release. No "Version Packages" PR is opened, so this needs no Actions
# PR-create permission (the path that was blocked on #26/#27 — see POS-19).
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm trusted publishing (OIDC) + provenance

concurrency:
  group: release-${{ github.ref }}

# Skip git hooks (husky) during the CI install.
env:
  HUSKY: '0'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # Checks out the tagged commit, whose package.json/CHANGELOG.md already
      # carry the bumped version from `pnpm changeset version`. This job uploads
      # no artifacts, so artipacked does not apply.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      # No pnpm cache: this privileged publish job must not restore a store that a
      # less-trusted workflow could have poisoned (zizmor cache-poisoning). A
      # release runs rarely, so a clean install is the right trade.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # npm trusted publishing (OIDC) needs npm >= 11.5.1; provenance is automatic.
      # Pinned (not @latest): this job holds id-token + write tokens, so a
      # compromised npm release must not be able to walk straight into it.
      - run: npm install -g npm@11.16.0
      # `pnpm release` = `changeset publish`: builds via the package's prepack and
      # publishes any version not yet on npm, authenticating through the existing
      # OIDC trusted publisher (org positronick, repo ui, workflow release.yml) —
      # no NPM_TOKEN. Idempotent: re-running a tag with nothing new is a no-op.
      - name: Publish to npm
        run: pnpm release
      # Cut a GitHub Release for the tag. Idempotent: skip if one already exists.
      - name: Create GitHub Release
        # Pass the tag through env, never inline ${{ github.ref_name }} into the
        # shell — that would be a template-injection sink (zizmor).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
          else
            gh release create "$TAG" --verify-tag --generate-notes
          fi
