name: Deploy demo & Storybook

on:
  push:
    branches: [main]
  workflow_dispatch:

# Needs GitHub Pages enabled for the repo (Settings → Pages → Source: GitHub Actions).
# Least privilege: scope Pages/OIDC to the deploy job only.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build demo (prerendered, under the repo subpath)
        run: pnpm exec vite build
        env:
          BASE_PATH: /${{ github.event.repository.name }}
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Assemble site (demo at /, Storybook at /storybook)
        run: |
          mkdir -p build/storybook
          cp -r storybook-static/. build/storybook/
          touch build/.nojekyll
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
