name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Dev toolchain (commitlint, vite) requires Node >= 22.12; skip git hooks in CI.
env:
  HUSKY: '0'

jobs:
  test:
    name: Lint, check & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm lint
      - run: pnpm check
      - run: pnpm test:coverage
      - name: Upload coverage to Coveralls
        if: matrix.node == 22
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          file: ./coverage/lcov.info

  package:
    name: Validate package & build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build package (svelte-package)
        run: pnpm prepack
      - name: Validate package (publint)
        run: pnpm check:package
      - name: Validate published types (attw)
        run: pnpm check:exports
      - name: Check bundle-size budget (size-limit)
        run: pnpm check:size
      - name: Find unused deps/exports/files (knip)
        run: pnpm check:unused
      - name: Build Storybook
        run: pnpm build-storybook

  security:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      # Audit reads pnpm-lock.yaml directly — no install, so no install scripts run.
      # Broader malicious-package scanning runs in osv-scanner.yml (OSV database).
      - name: Audit runtime dependencies (fails on high/critical)
        run: pnpm audit --prod --audit-level=high
