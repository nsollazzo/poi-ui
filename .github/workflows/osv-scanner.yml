name: OSV-Scanner

# Full scheduled/push scan of the lockfile against the OSV database + OpenSSF
# Malicious Packages feed. Non-blocking by design: results land in Security →
# Code scanning and feed the Scorecard. The diff-based PR gate (fails only on
# vulnerabilities a PR introduces) lives in osv-scanner-pr.yml; ci.yml's
# `pnpm audit` additionally blocks on high/critical advisories.
on:
  push:
    branches: [main]
  schedule:
    - cron: '41 5 * * 1' # weekly, Monday
  workflow_dispatch:

permissions: read-all

jobs:
  scan:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
